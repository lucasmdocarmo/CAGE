# Model configuration for Qwen/Qwen3-14B
# Larger model for production-like benchmarks

name: Qwen/Qwen3-14B
description: "Qwen3 14B - Large model for comprehensive evaluation"

# Model parameters
max_tokens: 512
temperature: 0.7
top_p: 0.95

# Hardware requirements (CPU mode - requires significant RAM)
requires_gpu: false
ram_gb: 32.0  # Approximate RAM needed for CPU inference
context_length: 131072  # 128K tokens

# vLLM configuration (CPU)
dtype: bfloat16
enable_prefix_caching: true
cpu_offload: true  # May need offloading on limited RAM

# Experiment tiers
tier: large
