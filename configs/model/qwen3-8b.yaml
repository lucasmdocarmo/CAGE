# Model configuration for Qwen/Qwen3-8B
# Medium model for standard benchmarking

name: Qwen/Qwen3-8B
description: "Qwen3 8B - Medium model for standard benchmarks (40K context)"

# Model parameters
max_tokens: 512
temperature: 0.7
top_p: 0.95

# Hardware requirements (CPU mode)
requires_gpu: false
ram_gb: 16.0  # Approximate RAM needed for CPU inference
context_length: 40960  # 40K tokens

# vLLM configuration (CPU)
dtype: bfloat16
enable_prefix_caching: true
cpu_offload: false

# Experiment tiers
tier: medium
