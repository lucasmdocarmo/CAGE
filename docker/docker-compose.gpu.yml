version: "3.9"
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  vllm-replica-1:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    command: ["--model", "mistralai/Mistral-7B-Instruct", "--port", "8001", "--enable-prefix-caching", "--enable-prompt-tokens-details"]
    environment:
      - VLLM_TENSOR_PARALLEL_SIZE=1
      - VLLM_GPU_MEMORY_UTILIZATION=0.9
    ports:
      - "8001:8001"

  vllm-replica-2:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    command: ["--model", "mistralai/Mistral-7B-Instruct", "--port", "8002", "--enable-prefix-caching", "--enable-prompt-tokens-details"]
    environment:
      - VLLM_TENSOR_PARALLEL_SIZE=1
      - VLLM_GPU_MEMORY_UTILIZATION=0.9
    ports:
      - "8002:8002"

  vllm-replica-3:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    command: ["--model", "mistralai/Mistral-7B-Instruct", "--port", "8003", "--enable-prefix-caching", "--enable-prompt-tokens-details"]
    environment:
      - VLLM_TENSOR_PARALLEL_SIZE=1
      - VLLM_GPU_MEMORY_UTILIZATION=0.9
    ports:
      - "8003:8003"

  router:
    build:
      context: .
      dockerfile: docker/router.Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - ROUTER_REPLICAS=replica-1=http://vllm-replica-1:8001,replica-2=http://vllm-replica-2:8002,replica-3=http://vllm-replica-3:8003
    depends_on:
      - vllm-replica-1
      - vllm-replica-2
      - vllm-replica-3
    ports:
      - "9000:9000"
