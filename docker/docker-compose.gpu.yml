version: "3.9"

# GPU stack (CUDA hosts: GCP / on-prem with NVIDIA + nvidia-container-toolkit).
# Model is Qwen3-8B to match terraform/gcp and the Phase 2 experiment command.
# Pass HF_TOKEN in the environment for gated models.

x-vllm-common: &vllm-common
  image: vllm/vllm-openai:latest # pin a concrete tag for reproducibility
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  vllm-replica-1:
    <<: *vllm-common
    # GPU memory utilization / TP must be CLI flags — the VLLM_* env vars are NOT
    # read by the openai server entrypoint.
    command: ["--model", "Qwen/Qwen3-8B", "--port", "8001", "--enable-prefix-caching", "--enable-prompt-tokens-details", "--gpu-memory-utilization", "0.9", "--tensor-parallel-size", "1"]
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8001/health\")' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 600s

  vllm-replica-2:
    <<: *vllm-common
    command: ["--model", "Qwen/Qwen3-8B", "--port", "8002", "--enable-prefix-caching", "--enable-prompt-tokens-details", "--gpu-memory-utilization", "0.9", "--tensor-parallel-size", "1"]
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8002/health\")' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 600s

  vllm-replica-3:
    <<: *vllm-common
    command: ["--model", "Qwen/Qwen3-8B", "--port", "8003", "--enable-prefix-caching", "--enable-prompt-tokens-details", "--gpu-memory-utilization", "0.9", "--tensor-parallel-size", "1"]
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8003/health\")' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 600s

  router:
    build:
      context: .
      dockerfile: docker/router.Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - ROUTER_REPLICAS=replica-1=http://vllm-replica-1:8001,replica-2=http://vllm-replica-2:8002,replica-3=http://vllm-replica-3:8003
    depends_on:
      vllm-replica-1:
        condition: service_healthy
      vllm-replica-2:
        condition: service_healthy
      vllm-replica-3:
        condition: service_healthy
    ports:
      - "9000:9000"
