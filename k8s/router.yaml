apiVersion: apps/v1
kind: Deployment
metadata:
  name: cage-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cage-router
  template:
    metadata:
      labels:
        app: cage-router
    spec:
      containers:
        - name: router
          image: cage-router:latest
          imagePullPolicy: Never
          env:
            - name: ROUTER_REPLICAS
              value: replica-1=http://vllm-replica-1:8001,replica-2=http://vllm-replica-2:8002,replica-3=http://vllm-replica-3:8003
          ports:
            - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: cage-router
spec:
  type: NodePort
  selector:
    app: cage-router
  ports:
    - port: 9000
      targetPort: 9000
      nodePort: 30090
      protocol: TCP
