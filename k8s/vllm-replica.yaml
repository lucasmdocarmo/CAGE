apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-replica-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-replica-1
  template:
    metadata:
      labels:
        app: vllm-replica-1
    spec:
      # For GPU clusters, add:
      # resources:
      #   limits:
      #     nvidia.com/gpu: 1
      # env:
      #   - name: VLLM_TENSOR_PARALLEL_SIZE
      #     value: "1"
      #   - name: VLLM_GPU_MEMORY_UTILIZATION
      #     value: "0.9"
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.11.0
          args: ["Qwen/Qwen3-4B", "--port", "8001", "--enable-prefix-caching", "--enable-prompt-tokens-details"]
          ports:
            - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-replica-1
spec:
  selector:
    app: vllm-replica-1
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
---
